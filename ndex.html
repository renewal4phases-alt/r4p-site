
<section>
  <h2>Apply / Contact</h2>
  <p>Please complete the form below. All submissions are reviewed and responded to directly.</p>

  <form action="https://formspree.io/f/xxxxabcd" method="POST" class="form-container">

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" required>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" required>
    </div>

    <div class="form-group">
      <label>Phone (optional)</label>
      <input type="text" name="phone">
    </div>

    <div class="form-group">
      <label>I am reaching out as:</label>
      <select name="type" required>
        <option value="">Select One</option>
        <option value="individual">Individual (Program)</option>
        <option value="partner">Partner / Organization</option>
        <option value="supporter">Supporter / General Inquiry</option>
      </select>
    </div>

    <div class="form-group">
      <label>Message</label>
      <textarea name="message" rows="5" required></textarea>
    </div>

    <button type="submit" class="submit-btn">Submit Application</button>

  </form>
</section>
